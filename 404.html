<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page not found – NoHungryPets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF6EF;
      --warm: #F2E8D9;
      --orange: #E8733A;
      --orange-deep: #C4542A;
      --green: #3A7D5A;
      --green-light: #EAF3EC;
      --brown: #3D2B1F;
      --brown-mid: #7A5C4A;
      --text: #2A1F17;
      --muted: #9A8578;
      --card-shadow: 0 4px 24px rgba(61,43,31,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 3rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      border: 1px solid rgba(61,43,31,0.06);
    }

    .top {
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(250,246,239,0.85);
      border-bottom: 1px solid rgba(61,43,31,0.08);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      font-family: 'Fraunces', serif;
      font-weight: 900;
      color: var(--brown);
      font-size: 1.2rem;
    }
    .brand span { color: var(--orange); }
    .pill {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-light);
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
    }

    .content {
      padding: 2.2rem 1.8rem 2.4rem;
      display: grid;
      gap: 1.25rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.05;
      color: var(--brown);
    }
    h1 em { color: var(--orange); font-style: italic; }

    p {
      color: var(--brown-mid);
      line-height: 1.7;
      max-width: 64ch;
    }

    .actions {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      margin-top: 0.3rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.4rem;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      border: 2px solid transparent;
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
      cursor: pointer;
      user-select: none;
    }

    .btn-primary {
      background: var(--orange);
      color: white;
      box-shadow: 0 4px 16px rgba(232,115,58,0.35);
    }
    .btn-primary:hover { background: var(--orange-deep); transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      color: var(--brown);
      border-color: rgba(61,43,31,0.2);
    }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      padding-top: 0.5rem;
    }

    code {
      background: var(--warm);
      padding: 0.15rem 0.4rem;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="top">
      <a class="brand" href="index.html">
        <span aria-hidden="true">🐾</span>
        No<span>Hungry</span>Pets
      </a>
      <div class="pill">404</div>
    </div>

    <div class="content">
      <h1>This page went <em>walkies</em></h1>
      <p>
        The link you followed doesn’t exist (or it moved). If you typed the address, double‑check it and try again.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="index.html">Back to home</a>
        <a class="btn btn-secondary" href="listings.html">Browse listings</a>
      </div>

      <div class="hint">
        Tip: on GitHub Pages, paths are case-sensitive. Try removing anything after the domain, e.g. <code>/post.html</code>.
      </div>
    </div>
  </main>
</body>
</html>
